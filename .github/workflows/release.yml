name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          archive="sure-unpack-${tag}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" unpack pack
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sure-unpack-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: "*.tar.gz"

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: ChunzhengLab/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          base_url="https://github.com/ChunzhengLab/sure-unpack/releases/download/${tag}"

          curl -sfL "${base_url}/sure-unpack-${tag}-aarch64-apple-darwin.tar.gz" -o arm64.tar.gz
          curl -sfL "${base_url}/sure-unpack-${tag}-x86_64-apple-darwin.tar.gz" -o x86_64_mac.tar.gz
          curl -sfL "${base_url}/sure-unpack-${tag}-x86_64-unknown-linux-gnu.tar.gz" -o x86_64_linux.tar.gz
          curl -sfL "${base_url}/sure-unpack-${tag}-aarch64-unknown-linux-gnu.tar.gz" -o aarch64_linux.tar.gz

          sha_arm64=$(sha256sum arm64.tar.gz | awk '{print $1}')
          sha_x86_64_mac=$(sha256sum x86_64_mac.tar.gz | awk '{print $1}')
          sha_x86_64_linux=$(sha256sum x86_64_linux.tar.gz | awk '{print $1}')
          sha_aarch64_linux=$(sha256sum aarch64_linux.tar.gz | awk '{print $1}')

          cat > Formula/unpack.rb << FORMULA
          class Unpack < Formula
            desc "Universal archive packer and unpacker with header-based format detection"
            homepage "https://github.com/ChunzhengLab/sure-unpack"
            version "${version}"
            license "MIT"

            depends_on "xz"
            depends_on "lz4"
            depends_on "zstd"
            depends_on "sevenzip" => :optional

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/sure-unpack-${tag}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_arm64}"
              else
                url "${base_url}/sure-unpack-${tag}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_x86_64_mac}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${base_url}/sure-unpack-${tag}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_aarch64_linux}"
              else
                url "${base_url}/sure-unpack-${tag}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_x86_64_linux}"
              end
            end

            def install
              bin.install "unpack"
              bin.install "pack"
            end

            test do
              assert_match "unpack", shell_output("#{bin}/unpack --help")
              assert_match "pack", shell_output("#{bin}/pack --help")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tag="${GITHUB_REF#refs/tags/}"
          git add Formula/unpack.rb
          git commit -m "Update unpack to ${tag}"
          git push
